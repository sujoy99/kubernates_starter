# Secret = like a ConfigMap but for sensitive values. Kubernetes stores
# these base64-encoded (NOT encrypted by default) and handles them a bit
# more carefully at the API level than a ConfigMap (e.g. `kubectl get -o
# yaml` shows the value; `kubectl describe` deliberately does not).
#
# This is a DUMMY value for demonstrating the mechanism only. Real secrets
# should never be committed to git in plaintext like this — in a real
# deployment you'd generate this at apply-time (`kubectl create secret
# --from-literal=...`) or pull it from a proper secret store (Vault,
# Sealed Secrets, cloud KMS, etc.), never check it into version control.
apiVersion: v1
kind: Secret
metadata:
  name: hello-service-secret
type: Opaque
stringData:
  FAKE_API_KEY: "demo-fake-api-key-abc123"
